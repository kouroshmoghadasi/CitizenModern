    <script>try{var t=localStorage.getItem('book_summary_2_theme');if(t==='dark')document.body.classList.add('theme-dark');var L=localStorage.getItem('book_summary_2_lang');if(L==='en')L='en-fa';if(L==='fr')L='fr-fa';if(L==='fa')L='en-fa';if(L==='en-fa'||L==='fr-fa')document.body.setAttribute('data-lang',L);var Sf=localStorage.getItem('book_summary_2_show_fa');document.body.setAttribute('data-show-fa',Sf==='no'?'no':'yes');}catch(e){}</script>
    <div class="container">
        <div class="header">
            <h1 class="header-book-summary-title">📖 خلاصهٔ کتاب ۲</h1>
        </div>

            <a href="/" class="back-btn back-btn-oneline">
                <span class="back-1l-fa">← بازگشت به صفحه اصلی</span><span class="back-1l-sep"> / </span><span class="back-1l-en">Back to Home</span><span class="back-1l-fr">Retour à l'accueil</span>
            </a>
        </div>
        <div class="tool-bar">
            <div class="group theme-toggle-wrap">
                <span class="theme-label theme-label-toolbar-fa">زبان:</span>
                <button type="button" class="theme-btn" id="langEnFa" title="نمایش انگلیسی همراه با فارسی" aria-pressed="true">EN+FA</button>
                <button type="button" class="theme-btn" id="langFrFa" title="نمایش فرانسوی همراه با فارسی" aria-pressed="false">FR+FA</button>
            </div>
            <div class="group theme-toggle-wrap">
                <label class="summary-fa-checkbox-label" title="با تیک زدن، متن و خلاصهٔ فارسی هم نمایش داده می‌شود؛ با برداشتن تیک، فقط انگلیسی یا فرانسوی می‌ماند.">
                    <input type="checkbox" id="summaryShowFa" aria-label="نمایش بخش فارسی خلاصهٔ کتاب">
                    <span class="summary-fa-checkbox-caption">نمایش بخش فارسی</span>
                </label>
            </div>
            <script>try{var s=document.getElementById('summaryShowFa');if(s)s.checked=document.body.getAttribute('data-show-fa')!=='no';}catch(e){}</script>

                <span class="theme-label theme-label-toolbar-fa">تم:</span>
                <button type="button" class="theme-btn" id="themeLight" title="تم روشن (حالت روز)" aria-pressed="true">☀️</button>

    <script>
(function(){
    var KEY_THEME = 'book_summary_2_theme', KEY_LANG = 'book_summary_2_lang', KEY_SHOW_FA = 'book_summary_2_show_fa';
    function theme(isDark){
        document.body.classList.toggle('theme-dark', !!isDark);
        try{ localStorage.setItem(KEY_THEME, isDark ? 'dark' : 'light'); }catch(e){}
        var light = document.getElementById('themeLight'), dark = document.getElementById('themeDark');
        if(light){ light.setAttribute('aria-pressed', isDark ? 'false' : 'true'); }
        if(dark){ dark.setAttribute('aria-pressed', isDark ? 'true' : 'false'); }
    }
    function lang(langCode){
        document.body.setAttribute('data-lang', langCode);
        try{ localStorage.setItem(KEY_LANG, langCode); }catch(e){}
        var enFa = document.getElementById('langEnFa'), frFa = document.getElementById('langFrFa');
        if(enFa){ enFa.setAttribute('aria-pressed', langCode === 'en-fa' ? 'true' : 'false'); }
        if(frFa){ frFa.setAttribute('aria-pressed', langCode === 'fr-fa' ? 'true' : 'false'); }
    }
    function showFa(on){
        var v = on ? 'yes' : 'no';
        document.body.setAttribute('data-show-fa', v);
        try{ localStorage.setItem(KEY_SHOW_FA, v); }catch(e){}
        var cb = document.getElementById('summaryShowFa');
        if(cb){ cb.checked = !!on; }
    }
    document.getElementById('themeLight')&&document.getElementById('themeLight').addEventListener('click', function(){ theme(false); });
    document.getElementById('themeDark')&&document.getElementById('themeDark').addEventListener('click', function(){ theme(true); });
    document.getElementById('langEnFa')&&document.getElementById('langEnFa').addEventListener('click', function(){ lang('en-fa'); });
    document.getElementById('langFrFa')&&document.getElementById('langFrFa').addEventListener('click', function(){ lang('fr-fa'); });
    document.getElementById('summaryShowFa')&&document.getElementById('summaryShowFa').addEventListener('change', function(){ showFa(this.checked); });
    var L0 = document.body.getAttribute('data-lang') || 'en-fa';
    var enFaBtn = document.getElementById('langEnFa'), frFaBtn = document.getElementById('langFrFa');
    if(enFaBtn) enFaBtn.setAttribute('aria-pressed', L0 === 'en-fa' ? 'true' : 'false');
    if(frFaBtn) frFaBtn.setAttribute('aria-pressed', L0 === 'fr-fa' ? 'true' : 'false');
    var isDark = document.body.classList.contains('theme-dark');
    var lightBtn = document.getElementById('themeLight'), darkBtn = document.getElementById('themeDark');
    if(lightBtn) lightBtn.setAttribute('aria-pressed', isDark ? 'false' : 'true');
    if(darkBtn) darkBtn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
    var sf0 = document.body.getAttribute('data-show-fa') || 'yes';
    showFa(sf0 !== 'no');
})();
    </script>
