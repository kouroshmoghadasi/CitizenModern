{# PWA: نوار نصب روی موبایل همیشه نشان داده می‌شود. دکمه «نصب اپ» فقط وقتی مرورگر (مثلاً Chrome) رویداد beforeinstallprompt را بفرستد نمایش داده می‌شود؛ در غیر این صورت راهنمای متنی «منو > افزودن به صفحه اصلی» نمایش داده می‌شود. #}
<link rel="manifest" href="{{ url_for('webapp_manifest') }}">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CitizenTest">
<script>
(function(){
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
    navigator.serviceWorker.register('{{ url_for("static", filename="sw.js") }}', { scope: '/' }).then(function(){}, function(){});
  }
  var pwaInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    pwaInstallPrompt = e;
    var fallback = document.getElementById('pwa-install-fallback');
    if (fallback) fallback.style.display = 'none';
  });
  window.addEventListener('appinstalled', function() {
    pwaInstallPrompt = null;
  });
  window.pwaInstall = function() {
    if (pwaInstallPrompt) {
      pwaInstallPrompt.prompt();
      pwaInstallPrompt.userChoice.then(function() { pwaInstallPrompt = null; });
    } else {
      var hint = document.querySelector('.pwa-install-hint');
      if (hint) {
        hint.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        hint.style.background = 'rgba(241, 196, 15, 0.25)';
        hint.style.padding = '6px 10px';
        hint.style.borderRadius = '6px';
        setTimeout(function() { hint.style.background = ''; hint.style.padding = ''; hint.style.borderRadius = ''; }, 3000);
      }
    }
  };
  function showPwaBar() {
    var bar = document.getElementById('pwa-install-bar');
    if (!bar) return;
    bar.style.display = 'block';
    var btn = document.getElementById('pwa-install-btn');
    var fallback = document.getElementById('pwa-install-fallback');
    if (btn) btn.style.display = 'inline-block';
    if (fallback) fallback.style.display = pwaInstallPrompt ? 'none' : 'inline';
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', showPwaBar);
  } else {
    setTimeout(showPwaBar, 100);
  }
})();
</script>
