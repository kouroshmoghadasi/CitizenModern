{# PWA / Web App meta and manifest — include in <head> #}
<link rel="manifest" href="{{ url_for('webapp_manifest') }}">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CitizenTest">
<script>
(function(){ if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) { navigator.serviceWorker.register('{{ url_for("static", filename="sw.js") }}', { scope: '/' }).then(function(){}, function(){}); } })();
</script>
