{# PWA / Web App meta and manifest — include in <head> #}
<link rel="manifest" href="{{ url_for('webapp_manifest') }}">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CitizenTest">
<script>
(function(){
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
    navigator.serviceWorker.register('{{ url_for("static", filename="sw.js") }}', { scope: '/' }).then(function(){}, function(){});
  }
  var pwaInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    pwaInstallPrompt = e;
    var bar = document.getElementById('pwa-install-bar');
    var btn = document.getElementById('pwa-install-btn');
    if (bar) bar.style.display = 'block';
    if (btn) btn.style.display = 'inline-block';
  });
  window.addEventListener('appinstalled', function() {
    pwaInstallPrompt = null;
    var bar = document.getElementById('pwa-install-bar');
    if (bar) bar.style.display = 'none';
  });
  window.pwaInstall = function() {
    if (pwaInstallPrompt) {
      pwaInstallPrompt.prompt();
      pwaInstallPrompt.userChoice.then(function() { pwaInstallPrompt = null; });
    }
  };
  function showPwaBarForIOS() {
    var bar = document.getElementById('pwa-install-bar');
    if (!bar) return;
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (isIOS && !pwaInstallPrompt) {
      bar.style.display = 'block';
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', showPwaBarForIOS);
  } else {
    setTimeout(showPwaBarForIOS, 100);
  }
})();
</script>
