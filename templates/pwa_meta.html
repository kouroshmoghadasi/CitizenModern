{# PWA: نوار نصب روی موبایل و دسکتاپ. دکمه «نصب اپ» همیشه نمایش داده می‌شود؛ اگر مرورگر prompt بفرستد با کلیک نصب می‌شود، وگرنه راهنمای نصب (ویندوز یا موبایل) نشان داده می‌شود. بعد از حذف اپ در ویندوز، مرورگر ممکن است prompt نفرستد — راهنما نحوه نصب مجدد را توضیح می‌دهد. #}
<link rel="manifest" href="{{ url_for('webapp_manifest') }}">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CitizenTest">
<script>
(function(){
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
    navigator.serviceWorker.register('{{ url_for("static", filename="sw.js") }}', { scope: '/' }).then(function(){}, function(){});
  }
  var pwaInstallPrompt = null;
  function isWindows() {
    var ua = navigator.userAgent || '';
    return ua.indexOf('Windows') !== -1 || (navigator.platform || '').indexOf('Win') !== -1;
  }
  function isAndroid() {
    var ua = navigator.userAgent || '';
    return /Android/i.test(ua);
  }
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    pwaInstallPrompt = e;
    var fallback = document.getElementById('pwa-install-fallback');
    var hintWin = document.getElementById('pwa-install-hint-windows');
    var hintAndroid = document.getElementById('pwa-install-hint-android');
    if (fallback) fallback.style.display = 'none';
    if (hintWin) hintWin.style.display = 'none';
    if (hintAndroid) hintAndroid.style.display = 'none';
  });
  window.addEventListener('appinstalled', function() {
    pwaInstallPrompt = null;
  });
  window.pwaInstall = function() {
    if (pwaInstallPrompt) {
      pwaInstallPrompt.prompt();
      pwaInstallPrompt.userChoice.then(function() { pwaInstallPrompt = null; });
    } else {
      if (isWindows()) {
        var msg = 'برای نصب مجدد در ویندوز:\n\n۱) در نوار آدرس مرورگر بنویسید: chrome://apps\n۲) روی اپ CitizenTest راست\u200cکلیک کنید و «Remove from Chrome» را بزنید.\n۳) این صفحه را رفرش کنید و دوباره روی «نصب APP» کلیک کنید.\n\nیا از منوی مرورگر (⋮) > اپلیکیشن\u200cها > نصب اپلیکیشن CitizenTest استفاده کنید.';
        alert(msg);
      } else if (isAndroid()) {
        var msg = 'برای نصب روی گوشی اندروید:\n\n۱) منوی مرورگر Chrome را باز کنید (آیکون سه\u200cنقطه ⋮ بالا).\n۲) گزینه «افزودن به صفحه اصلی» یا «نصب اپلیکیشن» یا «Add to Home screen» را بزنید.\n۳) در پنجره تأیید «نصب» یا «اضافه کردن» را بزنید.\n\nاگر گزینه را نمی\u200cبینید، یک بار صفحه را رفرش کنید و دوباره امتحان کنید.';
        alert(msg);
      }
      var hint = isWindows() ? document.getElementById('pwa-install-hint-windows') : (isAndroid() ? document.getElementById('pwa-install-hint-android') : document.querySelector('.pwa-install-hint:not(.pwa-install-hint-windows):not(.pwa-install-hint-android)'));
      if (hint) {
        hint.style.display = 'block';
        hint.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        hint.style.background = 'rgba(241, 196, 15, 0.25)';
        hint.style.padding = '8px 12px';
        hint.style.borderRadius = '6px';
        setTimeout(function() { hint.style.background = ''; hint.style.padding = ''; hint.style.borderRadius = ''; }, 5000);
      }
    }
  };
  function showPwaBar() {
    var bar = document.getElementById('pwa-install-bar');
    if (!bar) return;
    bar.style.display = 'block';
    var btn = document.getElementById('pwa-install-btn');
    var fallback = document.getElementById('pwa-install-fallback');
    var hintWin = document.getElementById('pwa-install-hint-windows');
    if (btn) btn.style.display = 'inline-block';
    var hintAndroid = document.getElementById('pwa-install-hint-android');
    if (pwaInstallPrompt) {
      if (fallback) fallback.style.display = 'none';
      if (hintWin) hintWin.style.display = 'none';
      if (hintAndroid) hintAndroid.style.display = 'none';
    } else {
      if (isWindows()) {
        if (fallback) fallback.style.display = 'none';
        if (hintWin) hintWin.style.display = 'block';
        if (hintAndroid) hintAndroid.style.display = 'none';
      } else if (isAndroid() && hintAndroid) {
        if (fallback) fallback.style.display = 'none';
        if (hintWin) hintWin.style.display = 'none';
        hintAndroid.style.display = 'block';
      } else {
        if (fallback) fallback.style.display = 'inline';
        if (hintWin) hintWin.style.display = 'none';
        if (hintAndroid) hintAndroid.style.display = 'none';
      }
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', showPwaBar);
  } else {
    setTimeout(showPwaBar, 100);
  }
})();
</script>
