{# Theme toggle + citizenSiteLang controls. Set modern_topbar_landing=true on modern_landing only for legacy DOM cleanup on theme click. #}
<script>
(function () {
  var root = document.documentElement;
  var btn = document.getElementById("themeToggle");
  var iconWrap = document.getElementById("themeToggleIcon");
  var landingExtras = {{ (modern_topbar_landing | default(false)) | tojson }};

  function iconMoon() {
    return '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21.2 15.4A8.9 8.9 0 0 1 10.6 2.8a1 1 0 0 0-1.2.6A10 10 0 1 0 20.6 16.6a1 1 0 0 0 .6-1.2Z"/></svg>';
  }
  function iconSun() {
    return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2"/><path d="M12 1.75v2.5M12 19.75v2.5M4.22 4.22l1.77 1.77M18.01 18.01l1.77 1.77M1.75 12h2.5M19.75 12h2.5M4.22 19.78l1.77-1.77M18.01 5.99l1.77-1.77" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
  }

  function getPreferredTheme() {
    var saved = null;
    try { saved = localStorage.getItem("citizenSiteTheme"); } catch (e) {}
    if (saved === "dark" || saved === "light") return saved;
    try { saved = localStorage.getItem("modernLandingTheme"); } catch (e2) {}
    if (saved === "dark" || saved === "light") return saved;
    if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) return "light";
    return "dark";
  }

  function applyTheme(theme) {
    root.setAttribute("data-theme", theme);
    try {
      document.body.classList.toggle("theme-dark", theme !== "light");
    } catch (e) {}
    if (btn) {
      btn.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
      btn.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
      btn.setAttribute("title", theme === "dark" ? "Light mode" : "Dark mode");
    }
    if (iconWrap) iconWrap.innerHTML = theme === "light" ? iconSun() : iconMoon();
    try {
      localStorage.setItem("citizenSiteTheme", theme);
      localStorage.setItem("modernLandingTheme", theme);
    } catch (e) {}
  }

  function stripLegacyJourneyPill() {
    try {
      var cand = document.querySelectorAll("button, a, [role=\"button\"], div");
      for (var i = 0; i < cand.length; i++) {
        var el = cand[i];
        var t = (el.textContent || "").replace(/\s+/g, " ").trim();
        if (t.indexOf("My Journey") !== -1 && t.indexOf("test date") !== -1 && el.parentNode) {
          el.parentNode.removeChild(el);
        }
      }
    } catch (e) {}
  }

  function enforceHeroSubtitle() {
    try {
      document.querySelectorAll("#landingLayout .hero__subtitle, section.hero .hero__subtitle").forEach(function (el) {
        if (el.querySelector && el.querySelector(".siteLang")) return;
        el.textContent = "Start with the Book Summary";
      });
    } catch (e) {}
  }

  function stripLegacyHeroNav() {
    try {
      document.querySelectorAll("#landingLayout .hero__links, #landingLayout .hero__kicker, .hero__links, .hero__kicker").forEach(function (el) {
        el.remove();
      });
      var hero = document.querySelector("#landingLayout section.hero, section.hero");
      if (!hero) return;
      var kids = hero.querySelectorAll("div, p");
      for (var j = 0; j < kids.length; j++) {
        var el = kids[j];
        var t = (el.textContent || "").replace(/\s+/g, " ").trim();
        if (t.indexOf("RECOMMENDED NEXT STEP") !== -1 && t.length < 80) el.remove();
        if (t.indexOf("Test Info") !== -1 && t.indexOf("FAQ") !== -1 && t.length < 120) el.remove();
      }
    } catch (e) {}
  }

  function runLandingThemeExtras() {
    if (!landingExtras) return;
    stripLegacyJourneyPill();
    stripLegacyHeroNav();
    enforceHeroSubtitle();
  }

  applyTheme(getPreferredTheme());
  runLandingThemeExtras();

  if (landingExtras) {
    try {
      var ll = document.getElementById("landingLayout");
      if (ll) ll.style.removeProperty("display");
    } catch (e) {}
  }

  var LANG_KEY = "citizenSiteLang";
  function readSiteLang() {
    try {
      var v = localStorage.getItem(LANG_KEY);
      if (v === "en-fa" || v === "fr-fa") return v;
      v = localStorage.getItem("book_summary_lang");
      if (v === "en-fa" || v === "fr-fa") return v;
      v = localStorage.getItem("book_summary_2_lang");
      if (v === "en-fa" || v === "fr-fa") return v;
    } catch (e0) {}
    return "en-fa";
  }
  function writeSiteLang(mode) {
    try {
      localStorage.setItem(LANG_KEY, mode);
      localStorage.setItem("book_summary_lang", mode);
      localStorage.setItem("book_summary_2_lang", mode);
      localStorage.setItem("citizenship_timeline_lang_mode", mode === "fr-fa" ? "fr" : "en");
    } catch (e1) {}
  }
  function applySiteLangUi(mode) {
    var enBtn = document.getElementById("siteLangEnFa");
    var frBtn = document.getElementById("siteLangFrFa");
    if (enBtn) enBtn.setAttribute("aria-pressed", mode === "en-fa" ? "true" : "false");
    if (frBtn) frBtn.setAttribute("aria-pressed", mode === "fr-fa" ? "true" : "false");
  }
  var siteLang = readSiteLang();
  applySiteLangUi(siteLang);
  var siteLangEn = document.getElementById("siteLangEnFa");
  var siteLangFr = document.getElementById("siteLangFrFa");
  if (siteLangEn) {
    siteLangEn.addEventListener("click", function () {
      var cur = readSiteLang();
      writeSiteLang("en-fa");
      if (cur !== "en-fa") {
        location.reload();
        return;
      }
      applySiteLangUi("en-fa");
    });
  }
  if (siteLangFr) {
    siteLangFr.addEventListener("click", function () {
      var cur = readSiteLang();
      writeSiteLang("fr-fa");
      if (cur !== "fr-fa") {
        location.reload();
        return;
      }
      applySiteLangUi("fr-fa");
    });
  }

  if (btn) {
    btn.addEventListener("click", function () {
      var current = root.getAttribute("data-theme") || "dark";
      applyTheme(current === "dark" ? "light" : "dark");
      runLandingThemeExtras();
    });
  }

  var SHOW_FA_KEY = "citizenSiteShowFa";
  var SHOW_LEGACY_1 = "book_summary_show_fa";
  var SHOW_LEGACY_2 = "book_summary_2_show_fa";
  function readShowPersianSections() {
    try {
      var v = localStorage.getItem(SHOW_FA_KEY);
      if (v === "yes" || v === "no") return v !== "no";
      v = localStorage.getItem(SHOW_LEGACY_1);
      if (v === "yes" || v === "no") return v !== "no";
      v = localStorage.getItem(SHOW_LEGACY_2);
      if (v === "yes" || v === "no") return v !== "no";
    } catch (e) {}
    return true;
  }
  function writeShowPersianSections(on) {
    var s = on ? "yes" : "no";
    try {
      localStorage.setItem(SHOW_FA_KEY, s);
      localStorage.setItem(SHOW_LEGACY_1, s);
      localStorage.setItem(SHOW_LEGACY_2, s);
    } catch (e) {}
  }
  var showFaCb = document.getElementById("siteShowPersianSections");
  if (showFaCb) {
    var showFaOn = readShowPersianSections();
    showFaCb.checked = showFaOn;
    try {
      document.body.setAttribute("data-show-fa", showFaOn ? "yes" : "no");
    } catch (e2) {}
    showFaCb.addEventListener("change", function () {
      writeShowPersianSections(showFaCb.checked);
      try {
        document.body.setAttribute("data-show-fa", showFaCb.checked ? "yes" : "no");
      } catch (e3) {}
    });
  }
})();

/* Site-wide visitor total: same API / session keys as scripts.html; skipped when scripts.html defines updateVisitorCount. */
(function () {
  if (typeof updateVisitorCount === "function") return;
  if (window.__citizenVisitorSyncV1) return;
  window.__citizenVisitorSyncV1 = true;

  var API_BASE = window.location.origin;
  var GET_EP = API_BASE + "/api/visitor-count";
  var INC_EP = API_BASE + "/api/visitor-count/increment";
  var SS_KEY = "citizen_visitor_home_incremented";
  var LS_KEY = "citizen_visitor_last_increment_at";
  var COOLDOWN = 60 * 60 * 1000;

  function setVisitorText(c) {
    document.querySelectorAll(".visitor-count-value").forEach(function (el) {
      el.textContent = Number(c).toLocaleString("en-US");
    });
  }

  function skipInc() {
    try {
      if (sessionStorage.getItem(SS_KEY) === "1") return true;
    } catch (e) {}
    try {
      var last = parseInt(localStorage.getItem(LS_KEY), 10);
      if (last > 0 && Date.now() - last < COOLDOWN) return true;
    } catch (e2) {}
    return false;
  }

  function markInc() {
    try {
      sessionStorage.setItem(SS_KEY, "1");
    } catch (e) {}
    try {
      localStorage.setItem(LS_KEY, String(Date.now()));
    } catch (e2) {}
  }

  function getCount() {
    return fetch(GET_EP, { method: "GET", headers: { "Content-Type": "application/json" } })
      .then(function (r) {
        if (!r.ok) throw new Error("get");
        return r.json();
      })
      .then(function (d) {
        return d.count || 0;
      });
  }

  function postInc() {
    return fetch(INC_EP, { method: "POST", headers: { "Content-Type": "application/json" } })
      .then(function (r) {
        if (!r.ok) throw new Error("inc");
        return r.json();
      })
      .then(function (d) {
        var c = d.count || 0;
        try {
          localStorage.setItem("citizenAppVisitorCount", String(c));
        } catch (e) {}
        return c;
      });
  }

  function runVisitor() {
    if (skipInc()) {
      getCount().then(setVisitorText).catch(function () {
        try {
          var v = localStorage.getItem("citizenAppVisitorCount");
          if (v) setVisitorText(parseInt(v, 10));
        } catch (e) {}
      });
      return;
    }
    postInc()
      .then(function (c) {
        markInc();
        setVisitorText(c);
      })
      .catch(function () {
        getCount()
          .then(function (c) {
            setVisitorText(c);
          })
          .catch(function () {
            try {
              var v = localStorage.getItem("citizenAppVisitorCount") || "0";
              setVisitorText(parseInt(v, 10));
            } catch (e) {}
          });
      });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", runVisitor);
  } else {
    runVisitor();
  }
})();
</script>
<script>
/* Practice pages: Study off; hub → Home chip, chapter → Practice chip (cached HTML) */
(function () {
  var path = (window.location.pathname || "/").replace(/\/+$/, "") || "/";
  if (path === "/citizenship-414" || path === "/citizenship-571" || path.indexOf("/citizenship-exam-report") === 0) {
    return;
  }
  var practice =
    document.documentElement.getAttribute("data-site-section") === "practice" ||
    document.body.classList.contains("modern-exams-practice");
  if (!practice) return;

  var isHub = path === "/citizenship-exams";

  document
    .querySelectorAll('.topbar__right a[href="/study"], .topbar-mobile-sheet a[href="/study"]')
    .forEach(function (el) {
      el.remove();
    });

  var homeHtml =
    '<span class="siteLang"><span class="siteLang__en">Home</span><span class="siteLang__fr">Accueil</span></span>';
  var practiceHtml =
    '<span class="siteLang"><span class="siteLang__en">Practice</span><span class="siteLang__fr">Entraînement</span></span>';

  document.querySelectorAll(".topbar__right, .topbar-mobile-sheet nav").forEach(function (nav) {
    if (!nav) return;
    nav.querySelectorAll("a[data-practice-nav-up]").forEach(function (el) {
      el.remove();
    });
    nav.querySelectorAll("a.chip--practice, a.chip[href='/']").forEach(function (el) {
      if (el.closest(".brand")) return;
      el.remove();
    });

    var a = document.createElement("a");
    a.setAttribute("data-practice-nav-up", "1");
    if (isHub) {
      a.className = "chip chip--lang";
      a.href = "/";
      a.innerHTML = homeHtml;
    } else {
      a.className = "chip chip--lang chip--practice";
      a.href = "/citizenship-exams";
      a.innerHTML = practiceHtml;
    }
    var first = nav.querySelector(".langBar, .chip--langToggle, button, label");
    if (first) nav.insertBefore(a, first);
    else nav.insertBefore(a, nav.firstChild);
  });
})();
</script>

    if (first) nav.insertBefore(a, first);
    else nav.insertBefore(a, nav.firstChild);

})();
</script>
<script>
/* Mobile: top menu — tap Menu to expand/collapse sheet below header */
(function () {
  var chrome = document.getElementById("siteHeaderChrome");
  var toggle = document.getElementById("topbarMobileToggle");
  var panel = document.getElementById("topbarMobilePanel");
  if (!chrome || !toggle || !panel) return;

  var mq = window.matchMedia("(max-width: 560px)");

  function isMobile() {
    return mq.matches;
  }

  function setExpanded(expanded) {
    chrome.classList.toggle("site-header-chrome--menu-expanded", expanded);
    toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
    var label = expanded ? "Close menu" : "Open menu";
    toggle.setAttribute("title", label);
    toggle.setAttribute("aria-label", label);
    if (expanded) {
      panel.removeAttribute("hidden");
    } else if (isMobile()) {
      panel.setAttribute("hidden", "");
    }
    try {
      document.documentElement.classList.toggle("topbar-menu-open", expanded && isMobile());
    } catch (e) {}
  }

  function collapse() {
    if (isMobile()) setExpanded(false);
  }

  toggle.addEventListener("click", function (e) {
    e.stopPropagation();
    if (!isMobile()) return;
    setExpanded(!chrome.classList.contains("site-header-chrome--menu-expanded"));
  });

  document.addEventListener("click", function (e) {
    if (!isMobile() || !chrome.classList.contains("site-header-chrome--menu-expanded")) return;
    if (chrome.contains(e.target)) return;
    collapse();
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") collapse();
  });

  function onMqChange() {
    if (isMobile()) {
      setExpanded(false);
      try {
        if (!sessionStorage.getItem("topbarMenuHintSeen")) {
          chrome.classList.add("site-header-chrome--hint");
          sessionStorage.setItem("topbarMenuHintSeen", "1");
          window.setTimeout(function () {
            chrome.classList.remove("site-header-chrome--hint");
          }, 4200);
        }
      } catch (err) {}
    } else {
      chrome.classList.remove("site-header-chrome--hint");
      panel.removeAttribute("hidden");
      setExpanded(false);
    }
  }

  if (typeof mq.addEventListener === "function") {
    mq.addEventListener("change", onMqChange);
  } else if (typeof mq.addListener === "function") {
    mq.addListener(onMqChange);
  }
  onMqChange();
})();
</script>
