<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    <title>لیست قبولی افراد از 25 ژانویه 2026 | Citizen</title>
    <meta name="description" content="لیست قبولی افراد از تاریخ 25 ژانویه 2026 تا کنون.">
    <link rel="canonical" href="{{ request.host_url.rstrip('/') }}/citizenship-exam-report">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --card-bg: #fff;
            --text: #1a1a1a;
            --accent: #1e3c72;
            --border: rgba(30,60,114,0.1);
        }
        body.theme-dark {
            --bg: linear-gradient(135deg, #1a1d24 0%, #0f1115 100%);
            --card-bg: #252830;
            --text: #e8eaed;
            --accent: #7cb3f5;
            --border: rgba(255,255,255,0.1);
        }
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body {
            font-family: Tahoma, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            padding: max(16px, env(safe-area-inset-top, 0px)) max(16px, env(safe-area-inset-right, 0px)) max(16px, env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-left, 0px));
            line-height: 1.7;
            color: var(--text);
        }
        .wrap { max-width: 960px; margin: 0 auto; width: 100%; }
        .back-bar { margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .back-btn {
            display: inline-block; padding: 12px 18px; min-height: 48px; line-height: 1.3;
            background: var(--accent); color: #fff;
            text-decoration: none; border-radius: 10px; font-weight: 600;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        .back-btn:hover { opacity: 0.92; }
        .report-page-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2c5282 100%);
            color: #fff;
            padding: 22px 18px;
            border-radius: 16px;
            margin-bottom: 22px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(30,60,114,0.2);
        }
        .report-page-header h1 {
            font-size: clamp(1.1rem, 4.5vw, 1.35em);
            margin-bottom: 0;
            line-height: 1.4;
        }
        @media (max-width: 640px) {
            body {
                padding: max(12px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px)) max(20px, env(safe-area-inset-bottom, 0px)) max(12px, env(safe-area-inset-left, 0px));
            }
            .wrap {
                width: 100%;
                max-width: none;
            }
            .back-bar {
                margin-bottom: 12px;
            }
            .back-btn {
                width: 100%;
                text-align: center;
                min-height: 48px;
                padding: 14px 18px;
                font-size: 1rem;
            }
            .report-page-header {
                padding: 18px 14px;
                margin-bottom: 16px;
                border-radius: 12px;
            }
            .report-page-header h1 {
                font-size: clamp(1rem, 4.8vw, 1.22em);
                line-height: 1.45;
            }
        }
    </style>
</head>
<body>
    <script>try{var t=localStorage.getItem('citizenship571_theme');if(t==='dark')document.body.classList.add('theme-dark');}catch(e){}</script>
    {% include 'content_protection.html' %}
    <div class="wrap">
        <div class="back-bar">
            <a href="/" class="back-btn">← خانه / Home</a>
        </div>
        <div class="report-page-header">
            <h1>گزارش قبولی و فهرست انتظار امتحان</h1>
        </div>
        {% include 'citizenship_exam_report_include.html' %}
    </div>
</body>
</html>
